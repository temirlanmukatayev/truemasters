<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>True Masters</title>
    </head>
    <body>
        <script>
            const language = navigator.language.split("-")[0];
            if (language === "ru") {
                window.location.href = 'ru/index.html';
            } else if (language === "en") {
                window.location.href = 'en/index.html';
            } else if (language === "kk") {
                window.location.href = 'kk/index.html';
            } else {
                window.location.href = 'ru/index.html';
            }
        </script>
    </body>
</html>
