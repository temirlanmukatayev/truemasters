    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body::before {

      background-size: 24px 24px; pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(37,99,235,0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 50% 100%, rgba(37,99,235,0.08) 0%, transparent 70%);

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 400px; animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
    .logo { font-size:22px; font-weight:800; letter-spacing:-0.02em; color:var(--white); text-decoration:none; }
    .lang-switcher { display:flex; gap:4px; }
    .lang-btn {

      padding:5px 11px; border-radius:4px; border:1px solid var(--border);
      background:transparent; color:var(--gray); cursor:pointer; transition:all 0.18s ease;
    }
    .lang-btn:hover { color:var(--white); border-color:rgba(255,255,255,0.2); }
    .lang-btn.active { background:var(--blue); border-color:var(--blue); color:var(--white); }
    .avatar { width:88px; height:88px; border-radius:50%; object-fit:cover; border:3px solid var(--blue); margin-bottom:20px; display:block; }
    .tag { display:inline-block; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--blue); margin-bottom:12px; }
    .name { font-size:clamp(32px,9vw,42px); font-weight:800; line-height:1.1; letter-spacing:-0.03em; margin-bottom:8px; }
    .divider { width:36px; height:2px; background:var(--blue); margin:20px 0; }
    .tagline { font-size:14px; font-weight:400; color:rgba(255,255,255,0.7); line-height:1.65; margin-bottom:32px; }
    .links { display:flex; flex-direction:column; gap:12px; }
    .link-btn {
      display:flex; align-items:center; gap:12px; padding:14px 20px; border-radius:6px;
      text-decoration:none; font-family:'Montserrat',sans-serif; font-size:14px; font-weight:600;
      transition:all 0.2s ease; border:none; cursor:pointer;
    }
    .link-btn.primary { background:var(--blue); color:var(--white); }
    .link-btn.primary:hover { background:var(--blue-hover); transform:translateY(-1px); }
    .link-btn.secondary { background:transparent; color:var(--white); border:1.5px solid rgba(255,255,255,0.25); }
    .link-btn.secondary:hover { border-color:rgba(255,255,255,0.55); transform:translateY(-1px); }
    .link-btn.save-contact { background:transparent; color:var(--white); border:1.5px solid rgba(255,255,255,0.25); }
    .link-btn.save-contact:hover { border-color:rgba(255,255,255,0.55); transform:translateY(-1px); }
    .btn-icon { width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; }

    footer { margin-top:32px; text-align:center; font-size:11px; font-weight:500; color:var(--gray); opacity:0.6; }
    footer a { color:var(--blue); text-decoration:none; }

<script>
  const i18n = {
    en: { tag: 'True Masters · Founder', tagline: 'We build AI solutions and IT products for businesses — from idea to launch.', save: 'Save Contact' },
    ru: { tag: 'True Masters · Основатель', tagline: 'Разрабатываем AI-решения и IT-продукты для бизнеса — от идеи до запуска.', save: 'Сохранить контакт' },
    kz: { tag: 'True Masters · Негізін қалаушы', tagline: 'Бизнеске арналған AI-шешімдер мен IT-өнімдер жасаймыз — идеядан бастап іске қосуға дейін.', save: 'Контактіні сақтау' }
  };
  function setLang(lang) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (i18n[lang]?.[key]) {
        const sub = el.querySelector('.btn-sub');
        if (sub) { el.childNodes[0].textContent = i18n[lang][key]; }
        else { el.textContent = i18n[lang][key]; }
      }
    });
    document.documentElement.lang = lang === 'kz' ? 'kk' : lang;
  }
</script>
